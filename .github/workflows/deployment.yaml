name: Deploy Project
on: 
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/*' 
  workflow_dispatch:
env:
  DB_NAME: demo
jobs:
  test:
    env:
      DB_USERNAME: ${{ vars.DB_USERNAME }} # vax
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}  # abc123 
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2
      - name: Run Tests
        run: mvn clean test
      - name: Output information
        run: |
          echo "DB_USERNAME: ${{ env.DB_USERNAME }}"
  # deploy:
  #   needs: test
  #   uses: ./.github/workflows/reusable.yaml
    # runs-on: ubuntu-latest
    # steps:
    #   - name: Output information
    #     run:  |
    #       echo "DB_USERNAME: ${{ env.DB_USERNAME }}"
    #       echo "DB_NAME: ${{ env.DB_NAME }}"
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      jar-file: ${{ steps.publish.outputs.jar_file }}
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2
      - name: Compile
        run: mvn clean package
      - name: Publish jar filename
        id: publish
        run: find target/*.jar -type f -execdir echo 'jar_file={}' >> $GITHUB_OUTPUT ';'  
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: target-files
          path: target
  deploy: 
    needs: build
    uses: ./.github/workflows/reusable.yaml
    with:
      artifact-name: target-files