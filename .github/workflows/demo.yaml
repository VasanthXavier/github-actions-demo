name: Demo Project
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/*'
  workflow_dispatch:          
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2
      - name: Run Tests
        id: run-tests
        run: mvn clean test
      - name: Output information
        if: steps.run-tests.outcome == 'failure'
        run: echo "Testing completed..."  
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      jar-file: ${{ steps.publish.outputs.jar_file }}
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2
      - name: Compile
        run: mvn clean package
      - name: Publish jar filename
        id: publish
        run: find target/*.jar -type f -execdir echo 'jar_file={}' >> $GITHUB_OUTPUT ';'  
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: target-files
          path: target
          # path: |
          #   target
          #   pom.xml   
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v8
        with:
          name: target-files
      - name: Output contents
        run: ls
      - name: Output filename
        run: echo "${{ needs.build.outputs.jar-file }}"  
      - name: Deploy
        run: echo "Deploying..."
  exit:
    runs-on: ubuntu-latest
    steps:
      - name: Information
        run: echo "Exiting...."